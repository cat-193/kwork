<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sertexity</title>
	<link rel="shortcut icon" type="image/x-icon" href="./assets/images/favicon.svg">
	<link rel="stylesheet" href="./assets/css/index.css">
	<script defer src="assets/js/app.js"></script>
</head>

<body>
	<div class="page-wrapper">
		<header class="header">
			<div class="container">
				<div class="header__wrapper">
					<nav class="header__nav">
						<ul class="header__nav-list">
							<li class="header__nav-item">
								<a class="header__nav-link" href="#">How it works</a>
							</li>
							<li class="header__nav-item">
								<a class="header__nav-link" href="#">Advantages</a>
							</li>
							<li class="header__nav-item">
								<a class="header__nav-link" href="#">Platform</a>
							</li>
						</ul>
					</nav>
					<a href="#" class="header__logo">
						<img src="./assets/images/logo.svg" alt="Sertexity logo">
					</a>
					<button class="header__button site-button">Sign Up</button>
				</div>
			</div>
		</header>
		<section class="hero">
			<h1 class="visually-hidden">Sertexity</h1>
			<div class="container">
				<div class="hero__wrapper">
					<div class="hero__content">
						<h2 class="hero__title">
							<span class="hero__title--blue">Earn with AI-powered</span>
							crypto arbitrage
						</h2>
						<div class="hero__box">
							<p class="hero__text">
								Our algorithms analyze the market and <span class="hero__text--bold">execute trades 24/7</span> — fully automated.
							</p>
							<p class="hero__text">
								<span class="hero__text--bold">Generate 0.4% to 0.6% daily by capturing</span> price differences across crypto exchanges.
							</p>
						</div>
						<button class="hero__button">
							<span class="hero__button-text">Start Earning</span>
							<span class="hero__button-icon">
								<img src="./assets/images/hero/arrow-icon.svg" alt="">
							</span>
						</button>
					</div>
					<div class="hero__images">
						<div class="hero__image-wrapper">
							<img src="./assets/images/hero/hero-image.webp" srcset="./assets/images/hero/hero-image.webp 1x, ./assets/images/hero/hero-image@2x.webp 2x" alt="board BTC/USDT" class="hero__image hero__image--main">
						</div>
						<img src="./assets/images/hero/hero-right-image.webp" srcset="./assets/images/hero/hero-right-image.webp 1x, ./assets/images/hero/hero-right-image@2x.webp 2x" alt="graph coins" class="hero__image hero__image--right">
						<img src="./assets/images/hero/hero-left-image.webp" srcset="./assets/images/hero/hero-left-image.webp 1x, ./assets/images/hero/hero-left-image@2x.webp 2x" alt="table graph" class="hero__image hero__image--left">
					</div>
				</div>
			</div>
		</section>
	</div>
</body>

</html>
